<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - Logística Boxer</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Outfit,sans-serif;background:#f0f4f8;color:#1a202c}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4f8 0%,#e8edf5 100%)}
.login-card{background:#fff;border-radius:14px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(29,50,123,.12);border:1px solid #e2e8f0}
.login-card h1{font-size:20px;color:#1d327b;font-weight:700;text-align:center;margin:12px 0 4px}
.login-card p{font-size:13px;color:#718096;text-align:center;margin-bottom:24px}
.badge{display:inline-block;background:#e8edf8;color:#1d327b;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin:0 auto 18px;text-align:center;width:100%}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:#4a5568;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:10px 14px;border:1px solid #c3cfe2;border-radius:8px;font-size:14px;font-family:Outfit;outline:none;transition:border-color .2s}
.field input:focus{border-color:#25bbee}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#1d327b,#162666);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Outfit;margin-top:4px;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.btn-login:disabled{background:#a0aec0;cursor:not-allowed;opacity:1}
.err-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border:1px solid #fecaca}
.hidden{display:none!important}
.logo-center{display:flex;justify-content:center;margin-bottom:10px}
.divider{border:none;border-top:1px solid #e2e8f0;margin:20px 0}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-center">
      <svg width="56" height="56" viewBox="0 0 200 200">
        <rect x="10" y="10" width="180" height="180" rx="30" fill="#e30613"/>
        <line x1="30" y1="30" x2="82" y2="95" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
        <polygon points="100,38 108,80 145,55 118,88 158,92 120,105 148,138 108,118 100,162 92,118 52,138 80,105 42,92 82,88 55,55 92,80" fill="#fff"/>
      </svg>
    </div>
    <h1>Follow Up - Importação</h1>
    <p id="formDesc">Dashboard Logística - Boxer Soldas</p>
    <div class="badge">Acesso restrito: @boxersoldas.com.br</div>
    <div id="loginErr" class="err-msg hidden"></div>
    <div class="field"><label>E-mail</label><input id="loginEmail" type="email" placeholder="seu@boxersoldas.com.br" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="field hidden" id="fieldConfirm"><label>Confirmar Senha</label><input id="loginConfirm" type="password" placeholder="••••••••"></div>
    <button class="btn-login" id="btnLogin" onclick="doAction()">Entrar</button>
    <hr class="divider">
    <div style="text-align:center;font-size:13px;color:#718096">
      <span id="toggleText">Não tem conta?</span>
      <span id="toggleLink" onclick="toggleMode()" style="color:#1d327b;font-weight:600;cursor:pointer;margin-left:4px">Criar conta</span>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://agtzfllruggjbscuwdyi.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFndHpmbGxydWdnamJzY3V3ZHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQyMTcsImV4cCI6MjA5NzEyMDIxN30.A-u9ezGh7c921sf-L8Q6XVgUjU412mAAdkcID1Ajk8g';

if (sessionStorage.getItem('boxer_log_session')) location.href = 'logistica.html';

let mode = 'login';

function toggleMode() {
  mode = mode === 'login' ? 'register' : 'login';
  const isReg = mode === 'register';
  document.getElementById('fieldConfirm').classList.toggle('hidden', !isReg);
  document.getElementById('btnLogin').textContent = isReg ? 'Criar conta' : 'Entrar';
  document.getElementById('formDesc').textContent = isReg ? 'Crie sua conta de acesso' : 'Dashboard Logística - Boxer Soldas';
  document.getElementById('toggleText').textContent = isReg ? 'Já tem conta?' : 'Não tem conta?';
  document.getElementById('toggleLink').textContent = isReg ? 'Entrar' : 'Criar conta';
  document.getElementById('loginErr').classList.add('hidden');
}

function doAction() {
  if (mode === 'login') doLogin(); else doRegister();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doAction(); });

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('btnLogin');

  if (!email || !pass) { showErr('Preencha todos os campos.'); return; }
  errEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Entrando...';

  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_ANON },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (data.error || !data.access_token) {
      showErr('E-mail ou senha incorretos.');
      btn.disabled = false; btn.textContent = 'Entrar';
      return;
    }
    sessionStorage.setItem('boxer_log_session', JSON.stringify(data));
    sessionStorage.setItem('boxer_log_email', email);
    location.href = 'logistica.html';
  } catch(e) {
    showErr('Erro de conexão. Tente novamente.');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doRegister() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const confirm = document.getElementById('loginConfirm').value;
  const btn = document.getElementById('btnLogin');

  if (!email || !pass || !confirm) { showErr('Preencha todos os campos.'); return; }
  if (!email.endsWith('@boxersoldas.com.br')) {
    showErr('Apenas e-mails @boxersoldas.com.br podem criar conta neste sistema.');
    return;
  }
  if (pass !== confirm) { showErr('As senhas não coincidem.'); return; }
  if (pass.length < 6) { showErr('A senha deve ter pelo menos 6 caracteres.'); return; }

  document.getElementById('loginErr').classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Criando conta...';

  try {
    const res = await fetch(`${SB_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_ANON },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (data.error) {
      showErr(data.error_description || 'Erro ao criar conta.');
      btn.disabled = false; btn.textContent = 'Criar conta';
      return;
    }
    if (data.access_token) {
      sessionStorage.setItem('boxer_log_session', JSON.stringify(data));
      sessionStorage.setItem('boxer_log_email', email);
      location.href = 'logistica.html';
    } else {
      const errEl = document.getElementById('loginErr');
      errEl.style.background = '#dcfce7'; errEl.style.color = '#15803d'; errEl.style.borderColor = '#86efac';
      errEl.textContent = 'Conta criada! Faça login para continuar.';
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Criar conta';
      toggleMode();
    }
  } catch(e) {
    showErr('Erro de conexão. Tente novamente.');
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.style.background = ''; el.style.color = ''; el.style.borderColor = '';
  el.textContent = msg;
  el.classList.remove('hidden');
}
</script>
</body>
</html>
